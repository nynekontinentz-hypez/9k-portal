<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9K Systems - Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #0a0e17;
            --bg-card: #111827;
            --bg-input: #0d1320;
            --accent: #22d3ee;
            --accent-dim: #0e7490;
            --accent-hover: #06b6d4;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #1e293b;
            --border-focus: #22d3ee;
            --glow: rgba(34, 211, 238, 0.15);
            --danger: #ef4444;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .grain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 1;
        }

        /* Nav */
        nav {
            position: fixed; top: 0; width: 100%; padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; background: rgba(10, 14, 23, 0.9);
            backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
        }
        .logo {
            font-family: 'Space Grotesk', sans-serif; font-weight: 700;
            font-size: 1.3rem; color: var(--text-primary);
            letter-spacing: -0.02em; text-decoration: none;
        }
        .logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; }
        .nav-links a {
            color: var(--text-secondary); text-decoration: none;
            font-size: 0.85rem; transition: color 0.2s;
        }
        .nav-links a:hover { color: var(--accent); }

        /* Login Card */
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            width: 90%;
            max-width: 420px;
            position: relative;
            z-index: 2;
        }
        .login-card h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-align: center;
        }
        .login-card .subtitle {
            color: var(--text-muted);
            font-size: 0.88rem;
            text-align: center;
            margin-bottom: 2rem;
        }

        .form-group { margin-bottom: 1.25rem; }
        .form-group label {
            display: block; font-size: 0.8rem; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.06em;
            margin-bottom: 0.35rem; font-weight: 500;
        }
        .form-group input {
            width: 100%; padding: 0.7rem 0.9rem;
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text-primary);
            font-size: 0.92rem; font-family: inherit;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none; border-color: var(--border-focus);
            box-shadow: 0 0 0 3px var(--glow);
        }

        .btn-login {
            width: 100%; padding: 0.75rem;
            background: var(--accent); color: var(--bg-dark);
            border: 1px solid var(--accent); border-radius: 8px;
            font-size: 0.92rem; font-family: inherit;
            font-weight: 600; cursor: pointer;
            transition: all 0.2s; margin-top: 0.5rem;
        }
        .btn-login:hover { background: var(--accent-hover); }
        .btn-login:disabled {
            opacity: 0.6; cursor: not-allowed;
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--danger);
            padding: 0.6rem 0.9rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }
        .error-msg.show { display: block; }

        .lock-icon {
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 1.25rem;
        }
        .lock-icon svg {
            width: 40px; height: 40px; color: var(--accent);
            opacity: 0.7;
        }

        @media (max-width: 480px) {
            .login-card { padding: 1.75rem; }
            nav { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="grain"></div>

    <nav>
        <a href="/" class="logo">9K<span>Systems</span></a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/submit-ticket">Submit Ticket</a>
        </div>
    </nav>

    <div class="login-card">
        <div class="lock-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
            </svg>
        </div>
        <h1>Admin Login</h1>
        <p class="subtitle">Sign in to access the dashboard</p>

        <div class="error-msg" id="errorMsg"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required autocomplete="email" autofocus placeholder="admin@9ksystems.net">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password">
            </div>
            <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
        </form>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.textContent = 'Signing in...';
            errorMsg.classList.remove('show');

            try {
                const res = await fetch('/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok && data.success) {
                    window.location.href = '/admin';
                } else {
                    errorMsg.textContent = data.error || 'Invalid credentials';
                    errorMsg.classList.add('show');
                }
            } catch (err) {
                errorMsg.textContent = 'Connection error. Please try again.';
                errorMsg.classList.add('show');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        }
    </script>
</body>
</html>
